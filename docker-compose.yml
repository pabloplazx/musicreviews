# Stack MusicReviews — Backend Spring Boot + Frontend React
# La BD vive en Aiven (remota), compartida entre dispositivos.
# Levantar con: docker compose up -d --build
# Detener con:  docker compose down

services:

  # =====================================================
  # Backend — Spring Boot, conecta a la BD MySQL en Aiven
  # =====================================================
  backend:
    image: musicreviews-backend:local
    build:
      context: ./backend/backend
    container_name: musicreviews-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: 'jdbc:mysql://${AIVEN_HOST}:${AIVEN_PORT}/${AIVEN_DATABASE}?useSSL=true&requireSSL=true'
      SPRING_DATASOURCE_USERNAME: ${AIVEN_USER}
      SPRING_DATASOURCE_PASSWORD: ${AIVEN_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS}
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET}
      LASTFM_API_KEY: ${LASTFM_API_KEY}
    expose:
      - "8080"

  # =====================================================
  # Frontend — React buildado por Vite, servido por nginx
  # =====================================================
  frontend:
    image: musicreviews-frontend:local
    build:
      context: ../musicreviews-frontend
      args:
        # URL relativa: el bundle hace fetch a /api/... del mismo dominio,
        # nginx hace proxy_pass a backend:8080. No depende del dominio.
        VITE_API_URL: /api
    container_name: musicreviews-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Certificados Let's Encrypt (read-only)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # Webroot para renovación ACME sin downtime
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend
